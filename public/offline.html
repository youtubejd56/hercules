<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Connection Lost</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#ff3e3e',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0a0a0a] m-0 p-0 overflow-hidden text-white flex items-center justify-center min-h-screen font-sans">
    
    <div class="fixed inset-0 z-[9999] flex flex-col items-center justify-center p-6 text-center">
        <div class="relative mb-12">
            <!-- Glow effect -->
            <div class="absolute inset-0 bg-primary/20 blur-3xl rounded-full scale-[2] animate-pulse"></div>
            
            <!-- Radar Ping Animations -->
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border border-primary/40 rounded-full animate-ping" style="animation-duration: 3s"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border border-primary/20 rounded-full animate-ping" style="animation-duration: 3s; animation-delay: 1s"></div>
            <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full border border-primary/10 rounded-full animate-ping" style="animation-duration: 3s; animation-delay: 2s"></div>

            <!-- Icon Container -->
            <div class="relative w-32 h-32 bg-[#181818] border border-white/10 rounded-full flex items-center justify-center shadow-[0_0_50px_rgba(255,62,62,0.15)] z-10">
                <svg class="w-14 h-14 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                    <path class="animate-pulse" style="animation-duration: 1.5s; animation-delay: 0s" d="M12 20h.01"></path>
                    <path class="animate-pulse opacity-40" style="animation-duration: 1.5s; animation-delay: 0.3s" d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <path class="animate-pulse opacity-20" style="animation-duration: 1.5s; animation-delay: 0.6s" d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                    <path class="animate-pulse opacity-10" style="animation-duration: 1.5s; animation-delay: 0.9s" d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                </svg>
            </div>
        </div>
        
        <h1 class="text-3xl md:text-4xl font-extrabold mb-4 uppercase tracking-widest animate-pulse">
            Searching...
        </h1>
        
        <p class="text-gray-400 text-sm md:text-base max-w-md mx-auto mb-10 leading-relaxed">
            It looks like you've gone off the grid. Check your internet connection to continue your fitness journey and sync your latest stats.
        </p>
        
        <button 
            onclick="window.location.reload()"
            class="px-8 py-4 bg-primary text-white font-bold rounded-xl uppercase tracking-widest hover:-translate-y-1 transition-all duration-300 flex items-center gap-3 mx-auto shadow-lg"
        >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            Try Again
        </button>
    </div>
</body>
</html>
